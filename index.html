<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Magic 8 Ball</title>

  <!-- Google Fonts: Roboto for M3 typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- M3 Top App Bar -->
  <header class="m3-top-bar">
    <span class="m3-top-bar-title">SF-Crew Vibe Coding</span>
  </header>

  <!-- Main Content -->
  <main class="page-wrapper">
    <h1 class="title">Magic 8 Ball</h1>
    <p class="subtitle">Ask a question, then press <strong>Run</strong></p>

    <div class="mode-selector">
      <label for="modeSelect">How we feeling today?</label>
      <select id="modeSelect" class="m3-select">
        <option value="nihilist">Nihilist</option>
        <option value="optimistic">Took a lot of Molly</option>
        <option value="benbowen">Ben Bowen</option>
      </select>
    </div>

    <div class="ball-container" id="ball">
      <!-- Outer "8" label -->
      <span class="eight-label">8</span>

      <!-- Inner triangle window -->
      <div class="window">
        <div class="triangle">
          <span class="response-text" id="responseText">&#x1F52E;</span>
        </div>
      </div>
    </div>

    <button class="run-btn" id="runBtn">Run</button>
  </main>

  <!-- M3 Footer -->
  <footer class="m3-footer">
    <a href="mailto:brad.russell16@gmail.com" class="m3-footer-link">brad.russell16@gmail.com</a>
  </footer>

  <script src="script.js"></script>
</body>
</html>
